<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./css/styles.css" />
    <link rel="stylesheet" href="./css/output.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&display=swap"
      rel="stylesheet"
    />
    <title>Media Queries</title>
  </head>
  <body>
    <header class="cabecalho">
      <h1 class="logo"><img src="./assets/Desktop/button.svg" alt="logo" /></h1>
      <section class="cabecalho__principal">
        <div class="container__cabecalho">
          <h1 class="cabecalho__titulo">Welcome to Sweetdeli!</h1>
          <p class="cabecalho__texto">
            Lorem ipsum dolor sit amet, consectetur adipiscing elit. Vulputate
            ut laoreet velit ma.
          </p>
        </div>
        <div class="cabecalho__imagem">
          <img src="./assets/Desktop/ant-design_picture-filled.svg" alt="" />
        </div>
      </section>
    </header>
    <main class="main">
      <section class="main__login">
        <div class="container__main">
          <h2 class="main__titulo">Welcome Back!</h2>
          <p class="main__texto">Meet the good taste today</p>
        </div>
        <div class="container__form">
          <form action="">
            <label for="email">E-mail</label>
            <input
              type="email"
              name="email"
              id="email"
              placeholder="Type your e-mail"
            />
            <label for="password">Password</label>
            <input
              type="password"
              name="password"
              id="password"
              placeholder="Type your password"
            />
            <a class="forgot" href="#">Forgot Password?</a>
            <button class="signIn" type="submit">Sign In</button>
            <p class="form__texto">or do it via other accounts</p>
            <div class="form__social">
              <button type="button">
                <a href="#"
                  ><img
                    src="./assets/Desktop/form-login/search 1.svg"
                    alt="google"
                /></a>
              </button>
              <button type="button">
                <a href="#"
                  ><img
                    src="./assets/Desktop/form-login/Desktop/form-login/Vector.svg"
                    alt="facebook"
                /></a>
              </button>
              <button type="button">
                <a href="#"
                  ><img
                    src="./assets/Desktop/form-login/Vector.svg"
                    alt="twitter"
                /></a>
              </button>
            </div>
          </form>
        </div>
        <p class="signUp">Don`t have an account? <a href="#">Sign Up</a></p>
      </section>
    </main>
  </body>
</html>
